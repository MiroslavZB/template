name: template # // TODO change back to your original name
description: A template for a new Flutter project.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 0.0.1+1

environment:
  sdk: '>=3.0.5 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  # state
  get: ^4.6.5

  # for storing IDs in Firestore
  uuid: ^3.0.7

  # firebase
  firebase_core: ^2.4.1
  firebase_auth: ^4.6.3
  cloud_firestore: ^4.3.1
  firebase_database: ^10.0.9
  firebase_crashlytics: ^3.3.5

  # Misc
  worldtime: ^1.0.9
  cupertino_icons: ^1.0.2
  cached_network_image: ^3.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
flutter:
  uses-material-design: true
